<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타다닥 v1.3</title>
  <link rel="stylesheet" href="milkdown-common.css" />
  <link rel="stylesheet" href="milkdown-frame-dark.css" />
  <style>
    @import url("https://fontcdn-six.vercel.app/f/monas12.css");

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #111111;
      --bg-secondary: #0a0a0a;
      --bg-sidebar: #080808;
      --bg-hover: #1a1a1a;
      --bg-active: #222222;
      --text-primary: #e8e8e8;
      --text-secondary: #999999;
      --text-muted: #666666;
      --accent: #cccccc;
      --accent-hover: #ffffff;
      --border: #262626;
      --success: #7ccf7c;
      --danger: #e06060;
      --font: 'MonaS12', 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ─── LOGIN ─── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 9000;
    }
    .login-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px 32px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .login-box h2 { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; text-align: center; }
    .login-box .sub { font-size: 0.82rem; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
    .login-box label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    #pw-input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 1rem; background: var(--bg-primary);
      color: var(--text-primary); outline: none;
      font-family: var(--font); letter-spacing: 0.15em;
      transition: border-color 0.2s;
    }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: var(--danger); animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    #login-btn {
      margin-top: 16px; width: 100%; padding: 11px;
      background: #ffffff; color: #000000;
      font-size: 0.92rem; font-weight: 700; font-family: var(--font);
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    #login-btn:hover { background: #e0e0e0; }
    #login-error { margin-top: 10px; font-size: 0.78rem; color: var(--danger); text-align: center; min-height: 18px; }

    /* ─── LAYOUT ─── */
    #app {
      display: none; height: 100vh;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr auto;
      transition: grid-template-columns 0.25s ease;
    }
    #app.active { display: grid; }
    #app.sidebar-collapsed { grid-template-columns: 0px 1fr; }
    #app.sidebar-collapsed #sidebar { overflow: hidden; border-right: none; width: 0; min-width: 0; padding: 0; }
    #app.sidebar-collapsed #title-bar { padding-left: 56px; }

    /* ─── FOCUS MODE ─── */
    #app.focus-mode { grid-template-columns: 0px 1fr; }
    #app.focus-mode #sidebar { overflow: hidden; border-right: none; width: 0; min-width: 0; }
    #app.focus-mode #title-bar { border-bottom: none; }
    #app.focus-mode #statusbar { display: none !important; }
    #app.focus-mode ~ #sidebar-toggle { display: none !important; }

    /* ─── SIDEBAR ─── */
    #sidebar {
      grid-row: 1 / 3;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, min-width 0.25s ease;
    }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 {
      font-size: 0.88rem; font-weight: 700; color: var(--text-primary);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-header h1 .logo {
      width: 22px; height: 22px; border-radius: 5px;
      background: #ffffff; color: #000000;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800;
    }
    .sidebar-actions { display: flex; gap: 6px; }
    #new-note-btn, #hashtag-btn {
      flex: 1; padding: 8px;
      background: var(--bg-hover); color: var(--text-primary);
      font-size: 0.78rem; font-weight: 600; font-family: var(--font);
      border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
      transition: background 0.15s;
    }
    #new-note-btn:hover, #hashtag-btn:hover { background: var(--bg-active); }
    #hashtag-btn { flex: 0 0 auto; padding: 8px 10px; font-size: 0.82rem; }

    .sidebar-search { padding: 10px 16px; }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
    }
    #sidebar-search {
      width: 100%; padding: 7px 12px 7px 32px;
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-primary);
      font-size: 0.8rem; font-family: var(--font); outline: none;
      transition: border-color 0.2s;
    }
    #sidebar-search:focus { border-color: var(--accent); }
    #sidebar-search::placeholder { color: var(--text-muted); }

    /* ─── HASHTAG PANEL ─── */
    #hashtag-panel {
      display: none; padding: 8px 12px; border-bottom: 1px solid var(--border);
      max-height: 160px; overflow-y: auto;
    }
    #hashtag-panel.active { display: block; }
    #hashtag-panel .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
    #hashtag-panel .tag-item {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 4px;
      background: var(--bg-hover); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 0.72rem; cursor: pointer;
      transition: all 0.15s;
    }
    #hashtag-panel .tag-item:hover { background: var(--bg-active); color: var(--text-primary); }
    #hashtag-panel .tag-item.active { background: #ffffff; color: #000000; border-color: #ffffff; }
    #hashtag-panel .tag-count { font-size: 0.65rem; opacity: 0.6; }
    #hashtag-panel .tag-clear {
      font-size: 0.7rem; color: var(--text-muted); cursor: pointer;
      padding: 3px 6px; margin-top: 6px; display: inline-block;
    }
    #hashtag-panel .tag-clear:hover { color: var(--text-primary); }

    #note-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    #note-list::-webkit-scrollbar { width: 4px; }
    #note-list::-webkit-scrollbar-track { background: transparent; }
    #note-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .note-item {
      padding: 10px 12px; border-radius: 6px; cursor: pointer;
      transition: background 0.1s; position: relative; margin-bottom: 2px;
    }
    .note-item:hover { background: var(--bg-hover); }
    .note-item.active { background: var(--bg-active); }
    .note-item-title { font-size: 0.84rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-meta { font-size: 0.66rem; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
    .note-item-preview { font-size: 0.72rem; color: var(--text-secondary); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item .delete-btn {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px;
      opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .note-item:hover .delete-btn { opacity: 1; }
    .note-item .delete-btn:hover { background: rgba(224,96,96,0.15); color: var(--danger); }

    .sidebar-footer {
      padding: 10px 16px; border-top: 1px solid var(--border);
      font-size: 0.7rem; color: var(--text-muted); text-align: center;
    }

    /* ─── CONTEXT MENU ─── */
    #context-menu {
      display: none; position: fixed; z-index: 9500;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px; min-width: 170px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    #context-menu .ctx-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 4px; cursor: pointer;
      font-size: 0.78rem; color: var(--text-primary); transition: background 0.1s;
    }
    #context-menu .ctx-item:hover { background: var(--bg-hover); }
    #context-menu .ctx-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ─── SIDEBAR TOGGLE ─── */
    #sidebar-toggle {
      position: fixed; top: 12px; left: 12px; z-index: 100;
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.15s;
    }
    #sidebar-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
    #app.active ~ #sidebar-toggle { display: flex; }
    #app.active:not(.sidebar-collapsed) ~ #sidebar-toggle { left: 252px; }

    /* ─── MAIN ─── */
    #main { display: flex; flex-direction: column; overflow: hidden; }
    #title-bar {
      padding: 16px 48px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      max-width: 820px; margin: 0 auto; width: 100%;
    }
    #note-title {
      flex: 1; border: none; background: transparent;
      font-size: 1.8rem; font-weight: 700; color: var(--text-primary);
      outline: none; font-family: var(--font);
    }
    #note-title::placeholder { color: var(--text-muted); }
    #focus-btn {
      padding: 5px 10px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.72rem; font-family: var(--font);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    #focus-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    #editor-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
    #empty-editor {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: var(--text-muted);
    }
    #empty-editor .icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 800; color: var(--text-primary);
    }
    #empty-editor p { font-size: 0.9rem; }

    /* ─── STATUS BAR ─── */
    #statusbar {
      padding: 6px 24px; border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex; align-items: center; gap: 16px;
      font-size: 0.72rem; color: var(--text-muted);
    }
    #save-status { display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .dot.saved { background: var(--success); }
    .dot.saving { background: #e0c050; }
    .dot.unsaved { background: var(--text-muted); }
    .status-sep { color: var(--border); }

    /* ─── MILKDOWN ─── */
    #milkdown-editor {
      flex: 1; overflow-y: auto; padding: 0;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      caret-color: transparent;
    }
    #milkdown-editor .ProseMirror { caret-color: transparent; position: relative; }
    #milkdown-editor .cm-editor .cm-cursor { border-left-color: #f0c040 !important; border-left-width: 4px !important; }
    @keyframes blink-caret { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    #custom-caret {
      position: absolute; width: 3px; height: 1.2em;
      background: #f0c040; pointer-events: none;
      z-index: 50; border-radius: 1px;
      animation: blink-caret 1s step-end infinite;
      display: none;
    }
    #note-title { caret-color: #f0c040; }
    #milkdown-editor .ProseMirror, #note-title { font-kerning: none; }
    #milkdown-editor::-webkit-scrollbar { width: 6px; }
    #milkdown-editor::-webkit-scrollbar-track { background: transparent; }
    #milkdown-editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #milkdown-editor .milkdown {
      height: 100%;
      background: var(--bg-primary) !important;
      color: var(--text-primary) !important;
      font-family: var(--font) !important;
      --crepe-color-background: var(--bg-primary);
      --crepe-color-on-background: var(--text-primary);
      --crepe-color-surface: var(--bg-secondary);
      --crepe-color-surface-low: var(--bg-sidebar);
      --crepe-color-on-surface: var(--text-primary);
      --crepe-color-on-surface-variant: var(--text-secondary);
      --crepe-color-outline: var(--border);
      --crepe-color-primary: var(--accent);
      --crepe-color-secondary: var(--bg-active);
      --crepe-color-on-secondary: var(--text-primary);
      --crepe-color-inverse: var(--text-primary);
      --crepe-color-on-inverse: var(--bg-primary);
      --crepe-color-inline-code: #d0d0d0;
      --crepe-color-hover: var(--bg-hover);
      --crepe-color-selected: var(--bg-active);
      --crepe-color-inline-area: var(--bg-hover);
      --crepe-font-default: var(--font);
      --crepe-font-title: var(--font);
      --crepe-font-code: 'Fira Code', Menlo, Monaco, monospace;
    }
    #milkdown-editor .milkdown .editor {
      padding: 32px 48px !important;
      min-height: 100%; max-width: 820px;
      margin: 0 auto; outline: none !important;
    }
    #milkdown-editor .milkdown .editor > * { color: var(--text-primary); }

    /* ─── TYPOGRAPHY ─── */
    #milkdown-editor .milkdown .ProseMirror p {
      font-size: 15.5px; line-height: 1.8; padding: 3px 0;
      letter-spacing: 0.01em; word-break: keep-all; overflow-wrap: break-word;
    }
    #milkdown-editor .milkdown .ProseMirror h1,
    #milkdown-editor .milkdown .ProseMirror h2,
    #milkdown-editor .milkdown .ProseMirror h3,
    #milkdown-editor .milkdown .ProseMirror h4,
    #milkdown-editor .milkdown .ProseMirror h5,
    #milkdown-editor .milkdown .ProseMirror h6 {
      font-weight: 700; letter-spacing: -0.01em; word-break: keep-all;
    }
    #milkdown-editor .milkdown .ProseMirror h1 {
      font-size: 1.95rem; line-height: 1.3; margin-top: 40px; margin-bottom: 8px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    #milkdown-editor .milkdown .ProseMirror h2 { font-size: 1.55rem; line-height: 1.35; margin-top: 36px; margin-bottom: 6px; }
    #milkdown-editor .milkdown .ProseMirror h3 { font-size: 1.28rem; line-height: 1.4; margin-top: 28px; margin-bottom: 4px; }
    #milkdown-editor .milkdown .ProseMirror h4 { font-size: 1.12rem; line-height: 1.45; margin-top: 24px; margin-bottom: 2px; }
    #milkdown-editor .milkdown .ProseMirror h5 { font-size: 1rem; line-height: 1.5; margin-top: 20px; }
    #milkdown-editor .milkdown .ProseMirror h6 { font-size: 0.92rem; line-height: 1.5; margin-top: 16px; color: var(--text-secondary); }
    #milkdown-editor .milkdown .ProseMirror blockquote {
      padding-left: 20px; margin: 12px 0; color: var(--text-secondary); font-style: italic;
    }
    #milkdown-editor .milkdown .ProseMirror blockquote::before { background: var(--text-muted); opacity: 0.6; width: 3px; }
    #milkdown-editor .milkdown .ProseMirror code {
      font-size: 0.88em; padding: 2px 6px; border-radius: 4px;
      background: rgba(255,255,255,0.06); color: #d0d0d0;
    }
    #milkdown-editor .milkdown .ProseMirror a {
      color: #b0b0b0; text-decoration: underline;
      text-decoration-color: rgba(176,176,176,0.3); text-underline-offset: 3px;
    }
    #milkdown-editor .milkdown .ProseMirror a:hover { color: #ffffff; text-decoration-color: rgba(255,255,255,0.5); }
    #milkdown-editor .milkdown .ProseMirror hr { margin: 24px 0; border: none; height: 1px; background: var(--border); }
    #milkdown-editor .milkdown .ProseMirror ul,
    #milkdown-editor .milkdown .ProseMirror ol { padding-left: 24px; }
    #milkdown-editor .milkdown .ProseMirror li { margin-bottom: 4px; }
    #milkdown-editor .milkdown .ProseMirror li p { padding: 1px 0; }
    #milkdown-editor .milkdown .milkdown-code-block { margin: 16px 0; border-radius: 8px; }
    #milkdown-editor .milkdown .milkdown-code-block .cm-editor { font-size: 13.5px; line-height: 1.6; }
    #milkdown-editor .milkdown .ProseMirror pre { border-radius: 8px; padding: 14px 18px; }

    /* ─── LIST MARKERS ─── */
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper { color: var(--text-primary) !important; }
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper svg { fill: var(--text-primary) !important; }
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper .label { color: var(--text-primary); font-weight: 600; font-size: 15px; }
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper .unchecked svg { fill: var(--text-muted) !important; opacity: 0.8; }
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper .unchecked:hover svg { fill: var(--text-primary) !important; opacity: 1; }
    #milkdown-editor .milkdown .milkdown-list-item-block li .label-wrapper .checked svg { fill: #ffffff !important; opacity: 1; }

    /* checked task-list strikethrough */
    #milkdown-editor .milkdown .milkdown-list-item-block[data-checked="true"] > .list-item > .children { text-decoration: line-through; text-decoration-color: var(--text-muted); color: var(--text-muted); }
    #milkdown-editor .milkdown .milkdown-list-item-block[data-checked="true"] > .list-item > .children p { color: var(--text-muted); }
    #milkdown-editor .milkdown .milkdown-list-item-block[data-checked="true"] .children { text-decoration: line-through; text-decoration-color: var(--text-muted); color: var(--text-muted); }
    #milkdown-editor .milkdown .milkdown-list-item-block[data-checked="true"] .children p { color: var(--text-muted); }

    /* ─── HASHTAG IN EDITOR ─── */
    ::highlight(editor-hashtag) {
      background: #ffffff;
      color: #000000;
    }

    /* ─── TEXT SELECTION ─── */
    #milkdown-editor .ProseMirror ::selection {
      background: #ffffff !important;
      color: #000000 !important;
    }
    #milkdown-editor .ProseMirror::selection {
      background: #ffffff !important;
      color: #000000 !important;
    }
    ::highlight(editor-hashtag)::selection {
      background: #000000 !important;
      color: #ffffff !important;
    }

    /* ─── TOOLBAR / UI ─── */
    #milkdown-editor .milkdown .milkdown-toolbar .toolbar-item svg { color: var(--text-secondary) !important; fill: var(--text-secondary) !important; }
    #milkdown-editor .milkdown .milkdown-toolbar .toolbar-item:hover svg { color: var(--text-primary) !important; fill: var(--text-primary) !important; }
    #milkdown-editor .milkdown .milkdown-toolbar .toolbar-item.active svg { color: #ffffff !important; fill: #ffffff !important; }
    #milkdown-editor .milkdown .milkdown-block-handle .operation-item svg { fill: var(--text-muted) !important; }
    #milkdown-editor .milkdown .milkdown-block-handle .operation-item:hover svg { fill: var(--text-primary) !important; }
    #milkdown-editor .milkdown .ProseMirror table { border-collapse: collapse; }
    #milkdown-editor .milkdown .ProseMirror th, #milkdown-editor .milkdown .ProseMirror td { border: 1px solid var(--border); padding: 8px 12px; }
    #milkdown-editor .milkdown .ProseMirror th { background: var(--bg-secondary); font-weight: 700; }
    #milkdown-editor .milkdown .milkdown-slash-menu { background: var(--bg-secondary) !important; border: 1px solid var(--border) !important; }
    #milkdown-editor .milkdown .milkdown-slash-menu .menu-groups .menu-group li:hover { background: var(--bg-hover) !important; }
    #milkdown-editor .milkdown .milkdown-toolbar { background: var(--bg-secondary) !important; border: 1px solid var(--border); }
    #milkdown-editor .milkdown .milkdown-link-preview > .link-preview,
    #milkdown-editor .milkdown .milkdown-link-edit > .link-edit { background: var(--bg-secondary) !important; border: 1px solid var(--border); }
    #milkdown-editor .milkdown .milkdown-link-preview > .link-preview > a { color: #b0b0b0 !important; }
    #milkdown-editor .milkdown .milkdown-link-edit > .link-edit > .input-area { color: var(--text-primary) !important; }
    #milkdown-editor .milkdown .milkdown-link-preview > .link-preview > .button > svg,
    #milkdown-editor .milkdown .milkdown-link-edit > .link-edit > .button > svg { color: var(--text-secondary) !important; fill: var(--text-secondary) !important; }
    #milkdown-editor .milkdown .milkdown-code-block { background: var(--bg-secondary) !important; border: 1px solid var(--border); }
    #milkdown-editor .milkdown .milkdown-code-block .cm-editor { background: transparent !important; }
    #milkdown-editor .milkdown .milkdown-code-block .cm-gutters { background: transparent !important; border-right: 1px solid var(--border) !important; color: var(--text-muted) !important; }
    #milkdown-editor .milkdown .milkdown-code-block .language-picker { color: var(--text-muted) !important; }
    #milkdown-editor .milkdown .crepe-placeholder::before { color: var(--text-muted) !important; }

    /* ─── LOADING ─── */
    #loading {
      position: fixed; inset: 0; background: var(--bg-primary);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 8000; gap: 16px;
    }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 0.85rem; color: var(--text-muted); }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 60px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.92); color: #000;
      padding: 8px 20px; border-radius: 20px;
      font-size: 0.82rem; opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s; z-index: 7000;
      font-family: var(--font);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h2>타다닥 v1.3</h2>
    <p style="font-size:0.68rem;color:#555;text-align:center;margin-bottom:2px;">made in ksthink@ksthink.com</p>
    <p class="sub">비밀번호를 입력해주세요</p>
    <label for="pw-input">비밀번호</label>
    <input id="pw-input" type="password" placeholder="••••" autocomplete="current-password" />
    <button id="login-btn">입장하기</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading" style="display:none;">
  <div class="spinner"></div>
  <p>불러오는 중...</p>
</div>

<!-- App -->
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">T</span> 타다닥 v1.3</h1>
      <p style="font-size:0.62rem;color:var(--text-muted);margin:-8px 0 4px 30px;">made in ksthink@ksthink.com</p>
      <div class="sidebar-actions">
        <button id="new-note-btn">+ 새 노트</button>
        <button id="hashtag-btn" title="해시태그 모아보기">#</button>
      </div>
    </div>
    <div id="hashtag-panel">
      <div class="tag-list" id="tag-list"></div>
    </div>
    <div class="sidebar-search">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="sidebar-search" type="text" placeholder="노트 검색..." autocomplete="off" />
      </div>
    </div>
    <div id="note-list"></div>
    <div class="sidebar-footer" id="note-count">0개의 노트</div>
  </aside>

  <div id="main">
    <div id="title-bar" style="display:none;">
      <input id="note-title" type="text" placeholder="제목을 입력하세요..." />
      <button id="focus-btn" title="집중 모드">집중 모드</button>
    </div>
    <div id="editor-wrap" style="display:none;">
      <div id="milkdown-editor"></div>
      <div id="custom-caret"></div>
    </div>
    <div id="empty-editor">
      <div class="icon">N</div>
      <p>노트를 선택하거나 새 노트를 만들어 시작하세요</p>
    </div>
    <div id="statusbar">
      <span id="save-status"><span class="dot unsaved"></span> <span id="save-label">대기 중</span></span>
      <span class="status-sep">|</span>
      <span id="char-count">0자</span>
      <span class="status-sep">|</span>
      <span style="margin-left:auto;">Ctrl+S 저장 · Ctrl+N 새 노트 · Esc 집중 모드 해제</span>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div id="context-menu">
  <div class="ctx-item" id="ctx-export">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    마크다운 내보내기
  </div>
  <div class="ctx-item" id="ctx-delete">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    삭제
  </div>
</div>

<!-- Sidebar Toggle -->
<button id="sidebar-toggle" title="목록 열기/닫기">☰</button>

<div id="toast"></div>

<script type="module">
import { Crepe, replaceAll } from './milkdown-crepe.bundle.js';

// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL = 'https://hkcbnibbguzbgqucnkzm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Kx0gAQwUHagHrNyFZo7xjg_7Y72LCFn';
const TABLE = 'notes';

// ─── AUTH ─────────────────────────────────────────────────
function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) + h) ^ str.charCodeAt(i); h = h >>> 0; }
  return h.toString(16);
}
const CORRECT_HASH = simpleHash('1318');
const SESSION_KEY = 'md_auth';

const loginScreen = document.getElementById('login-screen');
const pwInput     = document.getElementById('pw-input');
const loginBtn    = document.getElementById('login-btn');
const loginError  = document.getElementById('login-error');

function isAuthed() { return sessionStorage.getItem(SESSION_KEY) === CORRECT_HASH; }

function doLogin() {
  if (simpleHash(pwInput.value) === CORRECT_HASH) {
    sessionStorage.setItem(SESSION_KEY, CORRECT_HASH);
    loginScreen.style.display = 'none';
    initApp();
  } else {
    loginError.textContent = '비밀번호가 틀렸어요.';
    pwInput.classList.add('error');
    pwInput.value = '';
    setTimeout(() => { pwInput.classList.remove('error'); loginError.textContent = ''; }, 1500);
    pwInput.focus();
  }
}

loginBtn.addEventListener('click', doLogin);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (isAuthed()) loginScreen.style.display = 'none';

// ─── SUPABASE ─────────────────────────────────────────────
const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation',
};

async function dbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers, ...opts });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  if (res.status === 204) return null;
  return res.json();
}

async function loadNotes()         { return (await dbFetch(`${TABLE}?select=*&order=updated_at.desc`)) || []; }
async function createNoteDB(data)  { const [r] = await dbFetch(TABLE, { method:'POST', body: JSON.stringify(data) }); return r; }
async function patchNote(id, data) { const [r] = await dbFetch(`${TABLE}?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(data) }); return r; }
async function removeNoteDB(id)    { await dbFetch(`${TABLE}?id=eq.${id}`, { method:'DELETE' }); }

// ─── STATE ────────────────────────────────────────────────
let notes = [];
let currentNoteId = null;
let crepe = null;
let searchQuery = '';
let editorReady = false;
let activeTag = null;

// ─── DOM ──────────────────────────────────────────────────
const app         = document.getElementById('app');
const loading     = document.getElementById('loading');
const noteList    = document.getElementById('note-list');
const noteCountEl = document.getElementById('note-count');
const titleBar    = document.getElementById('title-bar');
const noteTitle   = document.getElementById('note-title');
const editorWrap  = document.getElementById('editor-wrap');
const emptyEditor = document.getElementById('empty-editor');
const saveLabel   = document.getElementById('save-label');
const charCountEl = document.getElementById('char-count');
const toastEl     = document.getElementById('toast');
const contextMenu = document.getElementById('context-menu');
const hashtagPanel = document.getElementById('hashtag-panel');
const tagListEl   = document.getElementById('tag-list');

let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

function setSaveStatus(state) {
  const dot = document.querySelector('#save-status .dot');
  dot.className = 'dot';
  if (state === 'saving')     { dot.classList.add('saving');  saveLabel.textContent = '저장 중...'; }
  else if (state === 'saved') { dot.classList.add('saved');   saveLabel.textContent = '저장 완료'; }
  else                        { dot.classList.add('unsaved'); saveLabel.textContent = '대기 중'; }
}

function getMarkdown() {
  if (!crepe) return '';
  try { return crepe.getMarkdown(); } catch { return ''; }
}

function updateCharCount() {
  charCountEl.textContent = `${getMarkdown().length}자`;
}

// ─── KOREAN DATE ──────────────────────────────────────────
function toKST(dateStr) {
  const d = new Date(dateStr);
  return new Date(d.getTime() + (d.getTimezoneOffset() + 540) * 60000);
}

function formatKoreanFull(dateStr) {
  const kr = toKST(dateStr);
  const y = kr.getFullYear();
  const m = kr.getMonth() + 1;
  const day = kr.getDate();
  const h = String(kr.getHours()).padStart(2, '0');
  const min = String(kr.getMinutes()).padStart(2, '0');
  return `${y}년 ${m}월 ${day}일 ${h}:${min}`;
}

function formatRelative(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '방금 전';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}분 전`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}시간 전`;
  return formatKoreanFull(dateStr);
}

// ─── HASHTAG ──────────────────────────────────────────────
function extractTags(content) {
  const matches = (content || '').match(/#[가-힣a-zA-Z0-9_]+/g);
  return matches ? [...new Set(matches)] : [];
}

function collectAllTags() {
  const tagMap = {};
  notes.forEach(n => {
    extractTags(n.content).forEach(tag => {
      tagMap[tag] = (tagMap[tag] || 0) + 1;
    });
  });
  return Object.entries(tagMap).sort((a, b) => b[1] - a[1]);
}

function renderHashtags() {
  const tags = collectAllTags();
  tagListEl.innerHTML = '';
  if (tags.length === 0) {
    tagListEl.innerHTML = '<span style="font-size:0.72rem;color:var(--text-muted);">해시태그가 없습니다</span>';
    return;
  }
  tags.forEach(([tag, count]) => {
    const el = document.createElement('span');
    el.className = 'tag-item' + (activeTag === tag ? ' active' : '');
    el.innerHTML = `${tag} <span class="tag-count">${count}</span>`;
    el.addEventListener('click', () => {
      activeTag = activeTag === tag ? null : tag;
      renderHashtags();
      renderNoteList();
    });
    tagListEl.appendChild(el);
  });
  if (activeTag) {
    const clear = document.createElement('div');
    clear.className = 'tag-clear';
    clear.textContent = '✕ 필터 해제';
    clear.addEventListener('click', () => { activeTag = null; renderHashtags(); renderNoteList(); });
    tagListEl.appendChild(clear);
  }
}

document.getElementById('hashtag-btn').addEventListener('click', () => {
  hashtagPanel.classList.toggle('active');
  if (hashtagPanel.classList.contains('active')) renderHashtags();
});

// ─── SIDEBAR ──────────────────────────────────────────────
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

let ctxNoteId = null;

function renderNoteList() {
  noteList.innerHTML = '';
  let filtered = notes.filter(n =>
    !searchQuery ||
    n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
    n.content.toLowerCase().includes(searchQuery.toLowerCase())
  );
  if (activeTag) {
    filtered = filtered.filter(n => extractTags(n.content).includes(activeTag));
  }

  filtered.forEach(n => {
    const item = document.createElement('div');
    item.className = 'note-item' + (n.id === currentNoteId ? ' active' : '');

    const preview = (n.content || '').replace(/[#*`>_\-\[\]()!~|]/g, '').substring(0, 60);
    const updatedStr = formatRelative(n.updated_at);
    const createdStr = formatKoreanFull(n.created_at);

    item.innerHTML = `
      <div class="note-item-title">${escHtml(n.title || '제목 없음')}</div>
      <div class="note-item-meta">수정: ${updatedStr}<br>생성: ${createdStr}</div>
      <div class="note-item-preview">${escHtml(preview) || '내용 없음'}</div>
      <button class="delete-btn" title="삭제">✕</button>
    `;

    item.addEventListener('click', e => {
      if (e.target.closest('.delete-btn')) return;
      selectNote(n.id);
    });
    item.querySelector('.delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      removeNote(n.id);
    });
    item.addEventListener('contextmenu', e => {
      e.preventDefault();
      ctxNoteId = n.id;
      contextMenu.style.display = 'block';
      contextMenu.style.left = e.clientX + 'px';
      contextMenu.style.top = e.clientY + 'px';
    });

    noteList.appendChild(item);
  });

  noteCountEl.textContent = `${notes.length}개의 노트`;
}

// ─── CONTEXT MENU ─────────────────────────────────────────
document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

document.getElementById('ctx-export').addEventListener('click', () => {
  const note = notes.find(n => n.id === ctxNoteId);
  if (!note) return;
  const blob = new Blob([note.content || ''], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${note.title || '제목 없음'}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('마크다운을 내보냈어요!');
});

document.getElementById('ctx-delete').addEventListener('click', () => {
  if (ctxNoteId) removeNote(ctxNoteId);
});

// ─── SIDEBAR TOGGLE ───────────────────────────────────────
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  app.classList.toggle('sidebar-collapsed');
});

// ─── FOCUS MODE ───────────────────────────────────────────
document.getElementById('focus-btn').addEventListener('click', () => {
  app.classList.add('focus-mode');
  showToast('집중 모드 · Esc로 해제');
});

// ─── EDITOR ───────────────────────────────────────────────
async function initEditor() {
  crepe = new Crepe({
    root: document.getElementById('milkdown-editor'),
    defaultValue: '',
    featureConfigs: {
      'code-mirror': { theme: 'dark' },
    },
  });

  await crepe.create();
  editorReady = true;

  crepe.on((listener) => {
    listener.markdownUpdated((_, md) => {
      if (!currentNoteId) return;
      const note = notes.find(n => n.id === currentNoteId);
      if (note) note.content = md;
      updateCharCount();
      debounceSave();
      scheduleHighlight();
    });
  });
}

let hlTimer = null;
function scheduleHighlight() {
  clearTimeout(hlTimer);
  hlTimer = setTimeout(applyHashtagHighlight, 300);
}

function applyHashtagHighlight() {
  if (!CSS.highlights) return;       // browser support check
  const editorEl = document.querySelector('#milkdown-editor .ProseMirror');
  if (!editorEl) return;
  const ranges = [];
  const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT, null);
  const re = /#[가-힣a-zA-Z0-9_]+/g;
  let node;
  while ((node = walker.nextNode())) {
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(node.textContent)) !== null) {
      const r = new Range();
      r.setStart(node, m.index);
      r.setEnd(node, m.index + m[0].length);
      ranges.push(r);
    }
  }
  const hl = new Highlight(...ranges);
  CSS.highlights.set('editor-hashtag', hl);
}

// ─── AUTO SAVE ────────────────────────────────────────────
let saveTimer = null;

function debounceSave() {
  setSaveStatus('unsaved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveCurrentNote, 1000);
}

async function saveCurrentNote() {
  if (!currentNoteId) return;
  const note = notes.find(n => n.id === currentNoteId);
  if (!note) return;

  setSaveStatus('saving');
  try {
    const updated = await patchNote(note.id, {
      title: note.title,
      content: note.content,
      updated_at: new Date().toISOString(),
    });
    if (updated) note.updated_at = updated.updated_at;
    setSaveStatus('saved');
    renderNoteList();
    if (hashtagPanel.classList.contains('active')) renderHashtags();
  } catch(e) {
    console.error(e);
    setSaveStatus('unsaved');
    showToast('저장 오류: ' + e.message);
  }
}

// ─── NOTE ACTIONS ─────────────────────────────────────────
async function addNote() {
  try {
    const note = await createNoteDB({
      title: '제목 없음',
      content: '',
      updated_at: new Date().toISOString(),
    });
    notes.unshift(note);
    selectNote(note.id);
    renderNoteList();
    noteTitle.focus();
    noteTitle.select();
    showToast('새 노트를 만들었어요!');
  } catch(e) {
    console.error(e);
    showToast('오류: ' + e.message);
  }
}

function selectNote(id) {
  if (currentNoteId && saveTimer) {
    clearTimeout(saveTimer);
    saveCurrentNote();
  }

  currentNoteId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;

  titleBar.style.display = 'flex';
  editorWrap.style.display = 'flex';
  emptyEditor.style.display = 'none';
  noteTitle.value = note.title;

  if (crepe && editorReady) {
    crepe.editor.action(replaceAll(note.content || ''));
  }

  updateCharCount();
  setSaveStatus('saved');
  renderNoteList();
  setTimeout(applyHashtagHighlight, 100);
}

async function removeNote(id) {
  if (!confirm('이 노트를 삭제할까요?')) return;
  try {
    await removeNoteDB(id);
    notes = notes.filter(n => n.id !== id);
    if (currentNoteId === id) {
      currentNoteId = null;
      titleBar.style.display = 'none';
      editorWrap.style.display = 'none';
      emptyEditor.style.display = 'flex';
      if (crepe && editorReady) crepe.editor.action(replaceAll(''));
      setSaveStatus('unsaved');
    }
    renderNoteList();
    showToast('노트를 삭제했어요.');
  } catch(e) {
    console.error(e);
    showToast('삭제 오류: ' + e.message);
  }
}

// ─── TITLE EDIT ───────────────────────────────────────────
noteTitle.addEventListener('input', () => {
  if (!currentNoteId) return;
  const note = notes.find(n => n.id === currentNoteId);
  if (note) note.title = noteTitle.value;
  debounceSave();
});

// ─── SEARCH ───────────────────────────────────────────────
document.getElementById('sidebar-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderNoteList();
});

// ─── BUTTONS ──────────────────────────────────────────────
document.getElementById('new-note-btn').addEventListener('click', addNote);

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); addNote(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); clearTimeout(saveTimer); saveCurrentNote(); }
  if (e.key === 'Escape' && app.classList.contains('focus-mode')) {
    app.classList.remove('focus-mode');
    showToast('집중 모드 해제');
  }
});

// ─── INIT ─────────────────────────────────────────────────
async function initApp() {
  app.classList.add('active');
  loading.style.display = 'flex';

  try {
    await initEditor();
    notes = await loadNotes();
    renderNoteList();
    if (notes.length > 0) selectNote(notes[0].id);
  } catch(e) {
    console.error(e);
    showToast('로딩 오류: ' + e.message);
  } finally {
    loading.style.display = 'none';
  }
}

// ─── CUSTOM CARET ─────────────────────────────────────────
const customCaret = document.getElementById('custom-caret');
const editorWrapEl = document.getElementById('editor-wrap');

function updateCustomCaret() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || !sel.isCollapsed) {
    customCaret.style.display = 'none';
    return;
  }
  const proseMirror = document.querySelector('#milkdown-editor .ProseMirror');
  if (!proseMirror || !proseMirror.contains(sel.anchorNode)) {
    customCaret.style.display = 'none';
    return;
  }
  const range = sel.getRangeAt(0);
  const rect = range.getClientRects()[0] || range.getBoundingClientRect();
  const wrapRect = editorWrapEl.getBoundingClientRect();
  if (!rect || rect.height === 0) { customCaret.style.display = 'none'; return; }
  customCaret.style.display = 'block';
  customCaret.style.left = (rect.left - wrapRect.left) + 'px';
  customCaret.style.top = (rect.top - wrapRect.top) + 'px';
  customCaret.style.height = rect.height + 'px';
}

document.addEventListener('selectionchange', updateCustomCaret);
document.addEventListener('keyup', updateCustomCaret);
document.addEventListener('click', () => requestAnimationFrame(updateCustomCaret));

if (isAuthed()) {
  initApp();
} else {
  loading.style.display = 'none';
  pwInput.focus();
}
</script>
</body>
</html>
